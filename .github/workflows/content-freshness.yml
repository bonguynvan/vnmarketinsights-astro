name: Content Freshness

# Weekly automated content-freshness audit. Scans reference/sector pages for
# dated claims and — when PERPLEXITY_API_KEY is set — attaches a per-page Sonar
# research brief (current figures + citations). Writes the report into a single
# tracking GitHub issue that is reused week to week (edited in place, not spammed).
# The audit never edits pages; a human applies verified numbers by hand.
on:
  schedule:
    # Weekly, Monday 22:00 UTC.
    - cron: "0 22 * * 1"
  workflow_dispatch: {}

concurrency:
  group: content-freshness
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # The audit script is pure Node (built-ins + global fetch) — no install needed.
      - name: Run freshness audit
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          PERPLEXITY_MODEL: sonar-pro
        run: node scripts/freshness-audit.mjs --out freshness-audit.md

      - name: Open or update the tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TITLE="Content freshness report"
          gh label create freshness --color FBCA04 --description "Content freshness tracking" --force || true

          # Prepend a run header, then truncate to stay under GitHub's issue body limit.
          {
            echo "_Auto-generated by the Content Freshness workflow — run $(date -u +%Y-%m-%dT%H:%MZ). Review before applying any figure; the audit never edits pages._"
            echo ""
            cat freshness-audit.md
          } | head -c 60000 > body.md

          NUM=$(gh issue list --state open --search "$TITLE in:title" \
                  --json number,title \
                  --jq ".[] | select(.title==\"$TITLE\") | .number" | head -n1)

          if [ -n "$NUM" ]; then
            gh issue edit "$NUM" --body-file body.md
            echo "Updated issue #$NUM"
          else
            gh issue create --title "$TITLE" --label freshness --body-file body.md
            echo "Created a new tracking issue"
          fi
