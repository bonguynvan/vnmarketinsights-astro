name: News Pipeline

# Crawl + enrich Vietnamese market news, generate the weekly brief, publish
# JSON/entity pages, and commit the results back. Vercel rebuilds on push.
on:
  schedule:
    # Daily 23:00 UTC ≈ 06:00 ICT. (The weekly brief naturally rolls over its
    # 7-day window; daily keeps trends + recent-developments fresh.)
    - cron: "0 23 * * *"
  workflow_dispatch: {}

concurrency:
  group: news-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline (crawl → enrich → embed → aggregate → brief → publish → notify)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LEAD_WEBHOOK_URL: ${{ secrets.LEAD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
          VNNEWS_ENRICH_LIMIT: "40"
        run: python run.py all

      # Refresh the committed stock OHLC snapshot. Best-effort: VietCap's gateway
      # may rate-limit or geo-block GitHub's runners; on failure the script leaves
      # the existing snapshot untouched, so the news pipeline never breaks on it.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh stock snapshot (best-effort)
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: node scripts/fetch-stock-snapshot.mjs

      - name: Commit results
        run: |
          cd "${GITHUB_WORKSPACE}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Add by directory (these always exist) so the step never fails on a
          # not-yet-created file like notify-state.json. .gitignore keeps DB
          # sidecar files (*.db-wal etc.) out. git add -A also stages new
          # entity/brief pages and regenerated JSON.
          git add -A pipeline/data src/content/articles src/data
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: news pipeline update $(date -u +%Y-%m-%d)"
            git push
          fi
