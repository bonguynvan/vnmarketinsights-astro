name: News Pipeline

# Crawl + enrich Vietnamese market news, generate the weekly brief, publish
# JSON/entity pages, and commit the results back. Vercel rebuilds on push.
on:
  schedule:
    # Daily 23:00 UTC ≈ 06:00 ICT. (The weekly brief naturally rolls over its
    # 7-day window; daily keeps trends + recent-developments fresh.)
    - cron: "0 23 * * *"
  workflow_dispatch: {}

concurrency:
  group: news-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline (crawl → enrich → embed → aggregate → brief → publish → notify)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LEAD_WEBHOOK_URL: ${{ secrets.LEAD_WEBHOOK_URL }}
          VNNEWS_ENRICH_LIMIT: "40"
        run: python run.py all

      - name: Commit results
        run: |
          cd "${GITHUB_WORKSPACE}"
          git config user.name "vnmarket-bot"
          git config user.email "bot@users.noreply.github.com"
          git add pipeline/data/news.db pipeline/data/notify-state.json src/content/articles \
            src/data/recent-by-topic.json src/data/trends.json src/data/news-index.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: news pipeline update $(date -u +%Y-%m-%d)"
            git push
          fi
